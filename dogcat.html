<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cat-Dog Classifier</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #6f77e8, #7a4fc2);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 30px 20px;
      color: #222;
    }

    .container {
      width: 100%;
      max-width: 1500px;
    }

    .header {
      text-align: center;
      color: #fff;
      margin-bottom: 35px;
    }

    .header h1 {
      font-size: 3rem;
      font-weight: 700;
      text-shadow: 0 3px 8px rgba(0, 0, 0, 0.25);
      margin-bottom: 12px;
    }

    .header p {
      font-size: 1.2rem;
      font-weight: 600;
      opacity: 0.95;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 22px;
      margin-bottom: 50px;
    }

    .card {
      background: rgba(255, 255, 255, 0.96);
      border-radius: 18px;
      padding: 28px 20px;
      text-align: center;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
      min-height: 150px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .card .value {
      font-size: 3rem;
      font-weight: 800;
      color: #22a55a;
      line-height: 1;
      margin-bottom: 10px;
    }

    .card .label {
      font-size: 1.15rem;
      color: #666;
    }

    .upload-box {
      background: rgba(255, 255, 255, 0.96);
      border-radius: 22px;
      padding: 52px 40px 70px;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.16);
    }

    .upload-title {
      text-align: center;
      font-size: 1.7rem;
      font-weight: 700;
      margin-bottom: 30px;
      color: #111;
    }

    .drop-area {
      border: 3px dashed #3e9bd1;
      border-radius: 22px;
      background: #f6fbff;
      min-height: 190px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: #333;
      transition: 0.3s ease;
      padding: 20px;
    }

    .drop-area:hover {
      background: #eef8ff;
      border-color: #2685bd;
    }

    .drop-area .main-text {
      font-size: 1.35rem;
      margin-bottom: 12px;
    }

    .drop-area .sub-text {
      font-size: 1rem;
      color: #6d6d6d;
    }

    input[type="file"] {
      display: none;
    }

    @media (max-width: 1100px) {
      .metrics {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 700px) {
      .header h1 {
        font-size: 2.2rem;
      }

      .metrics {
        grid-template-columns: 1fr;
      }

      .upload-box {
        padding: 30px 18px 40px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🐱 🐶 Cat-Dog Classifier</h1>
      <p><strong>92% Accuracy</strong> | CNN Trained on 30K+ Images</p>
    </div>

    <div class="metrics">
      <div class="card">
        <div class="value">92%</div>
        <div class="label">Accuracy</div>
      </div>
      <div class="card">
        <div class="value">91%</div>
        <div class="label">Precision</div>
      </div>
      <div class="card">
        <div class="value">93%</div>
        <div class="label">Recall</div>
      </div>
      <div class="card">
        <div class="value">92%</div>
        <div class="label">F1-Score</div>
      </div>
    </div>

    <div class="upload-box">
      <div class="upload-title">🖼 Upload Pet Image</div>

      <label for="fileInput" class="drop-area">
        <div>
          <div class="main-text">📁 Click or drag image here</div>
          <div class="sub-text">Supports JPG, PNG (Max 5MB)</div>
        </div>
      </label>

      <input type="file" id="fileInput" accept="image/*" />
    </div>
  </div>
</body>
</html>
